version: '3.8'

# KRaft 모드 Kafka - apache/kafka 공식 이미지
#
# [bitnami vs apache/kafka 환경변수 차이]
# bitnami:       KAFKA_CFG_LISTENERS, KAFKA_CFG_PROCESS_ROLES ...
# apache/kafka:  KAFKA_LISTENERS, KAFKA_PROCESS_ROLES ... (KAFKA_CFG_ 없음)

services:
  kafka:
    image: apache/kafka:4.0.2
    hostname: kafka
    container_name: kafka
    ports:
      - "9092:9092"       # 호스트(Spring Boot)에서 접근
    environment:
      # KRaft 기본 설정
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller

      # 리스너 2개:
      # PLAINTEXT_HOST → 호스트(localhost:9092)에서 Spring Boot가 접근
      # PLAINTEXT      → Docker 내부(kafka:29092)에서 kafka-ui가 접근
      # CONTROLLER     → KRaft 컨트롤러 내부 통신
      KAFKA_LISTENERS: PLAINTEXT_HOST://:9092,PLAINTEXT://:29092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT_HOST://localhost:9092,PLAINTEXT://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      # KRaft 컨트롤러 쿼럼
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      # 단일 브로커 (실무는 3 이상)
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

      # 학습용 편의 설정
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 1

      # KRaft Cluster ID (고정값 필수: 재시작 시 데이터 일관성 유지)
      # 22자 base64 형식의 UUID (아무 고정값이나 OK)
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"

    healthcheck:
      # apache/kafka 이미지의 스크립트 경로: /opt/kafka/bin/
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8989:8080"        # http://localhost:8989
    environment:
      KAFKA_CLUSTERS_0_NAME: local-kafka-kraft
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092   # Docker 내부 리스너
